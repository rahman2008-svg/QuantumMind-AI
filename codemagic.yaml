workflows:
  android-build:
    name: Android Build (APK)
    max_build_duration: 60

    environment:
      node: 20
      java: 17

    cache:
      cache_paths:
        - node_modules
        - ~/.gradle

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Clean Android build
        script: |
          cd android
          ./gradlew clean

      - name: Build APK (Release)
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - prince.ar.abdur.rahman2008@gmail.com
