workflows:
  android-build:
    name: Android Build Fixed
    max_build_duration: 60

    environment:
      node: 18
      java: 17

    cache:
      cache_paths:
        - node_modules
        - ~/.gradle

    scripts:
      - name: Fix npm environment
        script: |
          npm config set engine-strict false

      - name: Clean install
        script: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Android clean
        script: |
          cd android
          ./gradlew clean

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
